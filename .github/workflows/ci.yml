name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o graft ./cmd/graft/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/graft-linux-amd64       ./cmd/graft/
          GOOS=linux   GOARCH=arm64 go build -o dist/graft-linux-arm64       ./cmd/graft/
          GOOS=darwin  GOARCH=amd64 go build -o dist/graft-darwin-amd64      ./cmd/graft/
          GOOS=darwin  GOARCH=arm64 go build -o dist/graft-darwin-arm64      ./cmd/graft/
          GOOS=windows GOARCH=amd64 go build -o dist/graft-windows-amd64.exe ./cmd/graft/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
